# ══════════════════════════════════════════════
#  SGD — Stack complète
#  Wazuh 4.14.4 + TheHive 5 + OpenProject 14
# ══════════════════════════════════════════════

networks:
  frontend_net:
  backend_net:
  security_net:
  project_net:

volumes:
  postgres_data:
  redis_data:
  static_files:
  media_files:
  # Wazuh 4.14.4
  wazuh_manager_data:
  wazuh_indexer_data:
  # TheHive
  thehive_data:
  thehive_index:
  # OpenProject
  openproject_assets:
  openproject_pgdata:

services:

  # ──────────────────────────────────────────
  # 1. POSTGRESQL (Django)
  # ──────────────────────────────────────────
  db:
    image: postgres:15-alpine
    container_name: sgd_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-sgd_db}
      POSTGRES_USER: ${DB_USER:-sgd_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - backend_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-sgd_user}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ──────────────────────────────────────────
  # 2. REDIS
  # ──────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: sgd_redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-changeme}
    volumes:
      - redis_data:/data
    networks:
      - backend_net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ──────────────────────────────────────────
  # 3. DJANGO
  # ──────────────────────────────────────────
  django:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: sgd_django
    restart: unless-stopped
    env_file: .env
    environment:
      DB_HOST: db
      DB_PORT: "5432"
    volumes:
      - static_files:/app/staticfiles
      - media_files:/app/mediafiles
      - ../logs:/app/logs
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - backend_net
      - frontend_net
      - security_net
    ports:
      - "8000:8000"

  # ──────────────────────────────────────────
  # 4. NGINX
  # ──────────────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    container_name: sgd_nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - static_files:/app/staticfiles:ro
      - media_files:/app/mediafiles:ro
    depends_on:
      - django
    networks:
      - frontend_net

  # ══════════════════════════════════════════
  #  WAZUH 4.14.4
  #  Les 3 composants nécessitent des certs SSL
  #  Génère-les d'abord avec :
  #  docker run --rm \
  #    -v $(pwd)/docker/wazuh/config/certs:/certificates \
  #    -v $(pwd)/docker/wazuh/config/certs.yml:/config/certs.yml \
  #    wazuh/wazuh-certs-generator:0.0.4
  # ══════════════════════════════════════════

  # ──────────────────────────────────────────
  # 5. WAZUH INDEXER (OpenSearch)
  # ──────────────────────────────────────────
  wazuh-indexer:
    image: wazuh/wazuh-indexer:4.14.4
    container_name: sgd_wazuh_indexer
    hostname: wazuh-indexer
    restart: unless-stopped
    environment:
      - "OPENSEARCH_JAVA_OPTS=-Xms512m -Xmx512m"
      - bootstrap.memory_lock=true
      - INDEXER_SECURITY_SSL_HTTP_PEMCERT_FILEPATH=/usr/share/wazuh-indexer/config/certs/indexer.pem
      - INDEXER_SECURITY_SSL_HTTP_PEMKEY_FILEPATH=/usr/share/wazuh-indexer/config/certs/indexer-key.pem
      - INDEXER_SECURITY_SSL_HTTP_PEMTRUSTEDCAS_FILEPATH=/usr/share/wazuh-indexer/config/certs/root-ca.pem
      - INDEXER_SECURITY_SSL_TRANSPORT_PEMCERT_FILEPATH=/usr/share/wazuh-indexer/config/certs/indexer.pem
      - INDEXER_SECURITY_SSL_TRANSPORT_PEMKEY_FILEPATH=/usr/share/wazuh-indexer/config/certs/indexer-key.pem
      - INDEXER_SECURITY_SSL_TRANSPORT_PEMTRUSTEDCAS_FILEPATH=/usr/share/wazuh-indexer/config/certs/root-ca.pem
      - INDEXER_SECURITY_AUTHCZ_ADMIN_DN=CN=admin,OU=Wazuh,O=Wazuh,L=California,C=US
      - INDEXER_SECURITY_CHECK_SNAPSHOT_RESTORE_WRITE_PRIVILEGES=true
      - INDEXER_SECURITY_ENABLE_SNAPSHOT_RESTORE_PRIVILEGE=true
      - INDEXER_SECURITY_NODES_DN=CN=wazuh-indexer,OU=Wazuh,O=Wazuh,L=California,C=US
      - INDEXER_SECURITY_RESTAPI_ROLES_ENABLED=["all_access", "security_rest_api_access"]
      - INDEXER_SECURITY_SYSTEM_INDICES_ENABLED=true
      - INDEXER_SECURITY_SYSTEM_INDICES_INDICES=[".opendistro-alerting-config",".opendistro-alerting-alert*",".opendistro-anomaly-results*",".opendistro-anomaly-detector*",".opendistro-anomaly-checkpoints",".opendistro-anomaly-detection-state",".opendistro-reports-*",".opendistro-notifications-*",".opendistro-notebooks",".opensearch-observability",".opendistro-asynchronous-search-response*",".replication-metadata-store"]
      - CLUSTER_NAME=wazuh-cluster
      - NETWORK_HOST=0.0.0.0
      - NODE_NAME=wazuh-indexer
      - DISCOVERY_TYPE=single-node
      - compatibility.override_main_response_version=true
    volumes:
      - wazuh_indexer_data:/var/lib/wazuh-indexer
      - ./wazuh/config/certs/root-ca.pem:/usr/share/wazuh-indexer/config/certs/root-ca.pem:ro
      - ./wazuh/config/certs/wazuh-indexer.pem:/usr/share/wazuh-indexer/config/certs/indexer.pem:ro
      - ./wazuh/config/certs/wazuh-indexer-key.pem:/usr/share/wazuh-indexer/config/certs/indexer-key.pem:ro
      - ./wazuh/config/certs/admin.pem:/usr/share/wazuh-indexer/config/certs/admin.pem:ro
      - ./wazuh/config/certs/admin-key.pem:/usr/share/wazuh-indexer/config/certs/admin-key.pem:ro
    networks:
      - security_net
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65536
        hard: 65536
    healthcheck:
      test: ["CMD-SHELL", "curl -fks https://localhost:9200/_plugins/_security/health | grep -q '\"status\":\"UP\"'"]
      interval: 30s
      timeout: 10s
      retries: 10

  # ──────────────────────────────────────────
  # 6. WAZUH MANAGER
  # ──────────────────────────────────────────
  wazuh-manager:
    image: wazuh/wazuh-manager:4.14.4
    container_name: sgd_wazuh_manager
    hostname: wazuh-manager
    restart: unless-stopped
    ports:
      - "1514:1514"
      - "1515:1515"
      - "514:514/udp"
      - "55000:55000"
    environment:
      INDEXER_URL: https://wazuh-indexer:9200
      INDEXER_USERNAME: admin
      INDEXER_PASSWORD: ${WAZUH_INDEXER_PASSWORD:-admin}
      FILEBEAT_SSL_VERIFICATION_MODE: none
      SSL_CERTIFICATE_AUTHORITIES: /etc/ssl/root-ca.pem
      SSL_CERTIFICATE: /etc/ssl/filebeat.pem
      SSL_KEY: /etc/ssl/filebeat.key
      API_USERNAME: ${WAZUH_API_USER:-wazuh-wui}
      API_PASSWORD: ${WAZUH_API_PASSWORD:-Wazuh@Securite2026!}
    volumes:
      - wazuh_manager_data:/var/ossec/data
      - ./wazuh/config/certs/root-ca-manager.pem:/etc/ssl/root-ca.pem:ro
      - ./wazuh/config/certs/wazuh-manager.pem:/etc/ssl/filebeat.pem:ro
      - ./wazuh/config/certs/wazuh-manager-key.pem:/etc/ssl/filebeat.key:ro
    depends_on:
      wazuh-indexer:
        condition: service_healthy
    networks:
      - security_net
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65536
        hard: 65536
    cap_add:
      - SYS_RESOURCE

  # ──────────────────────────────────────────
  # 7. WAZUH DASHBOARD
  # ──────────────────────────────────────────
  wazuh-dashboard:
    image: wazuh/wazuh-dashboard:4.14.4
    container_name: sgd_wazuh_dashboard
    hostname: wazuh-dashboard
    restart: unless-stopped
    ports:
      - "5601:5601"
    environment:
      # OPENSEARCH_HOSTS: '["https://wazuh-indexer:9200"]'
      WAZUH_API_URL: https://wazuh-manager
      WAZUH_API_USER: ${WAZUH_API_USER:-wazuh-wui}
      WAZUH_API_PASSWORD: ${WAZUH_API_PASSWORD:-Wazuh@Securite2026!}
      DASHBOARD_USERNAME: ${DASHBOARD_USERNAME:-kibanaserver}
      DASHBOARD_PASSWORD: ${DASHBOARD_PASSWORD:-Wazuh@Securite2026!}
    volumes:
      - ./wazuh/config/certs/wazuh-dashboard.pem:/usr/share/wazuh-dashboard/certs/dashboard.pem:ro
      - ./wazuh/config/certs/wazuh-dashboard-key.pem:/usr/share/wazuh-dashboard/certs/dashboard-key.pem:ro
      - ./wazuh/config/certs/root-ca.pem:/usr/share/wazuh-dashboard/certs/root-ca.pem:ro
      - ./wazuh/config/wazuh_dashboard/opensearch_dashboards.yml:/usr/share/wazuh-dashboard/config/opensearch_dashboards.yml:ro
      - ./wazuh/config/wazuh_dashboard/wazuh.yml:/usr/share/wazuh-dashboard/data/wazuh/config/wazuh.yml:ro
    depends_on:
      wazuh-indexer:
        condition: service_healthy
      wazuh-manager:
        condition: service_started
    networks:
      - security_net

  # ──────────────────────────────────────────
  # 8. THEHIVE
  # ──────────────────────────────────────────
  thehive:
    image: strangebee/thehive:5.3
    container_name: sgd_thehive
    restart: unless-stopped
    ports:
      - "9000:9000"
    environment:
      JVM_OPTS: "-Xms512m -Xmx1024m"
    volumes:
      - thehive_data:/opt/thp/thehive/data
      - thehive_index:/opt/thp/thehive/index
    depends_on:
      - cassandra
    networks:
      - security_net

  cassandra:
    image: cassandra:4.1
    container_name: sgd_cassandra
    restart: unless-stopped
    environment:
      CASSANDRA_CLUSTER_NAME: thehive
      HEAP_NEWSIZE: 128M
      MAX_HEAP_SIZE: 512M
    networks:
      - security_net
    healthcheck:
      test: ["CMD-SHELL", "nodetool status | grep UN"]
      interval: 30s
      timeout: 10s
      retries: 10

  # ──────────────────────────────────────────
  # 9. OPENPROJECT
  # ──────────────────────────────────────────
  openproject:
    image: openproject/openproject:14
    container_name: sgd_openproject
    restart: unless-stopped
    ports:
      - "8081:80"
    environment:
      OPENPROJECT_HOST__NAME: localhost:8081
      OPENPROJECT_SECRET_KEY_BASE: ${OPENPROJECT_SECRET:-changeme_long_secret}
      DATABASE_URL: postgresql://${OP_DB_USER:-op_user}:${OP_DB_PASS:-changeme}@op_db/openproject
    volumes:
      - openproject_assets:/var/openproject/assets
    depends_on:
      - op_db
    networks:
      - project_net

  op_db:
    image: postgres:15-alpine
    container_name: sgd_op_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: openproject
      POSTGRES_USER: ${OP_DB_USER:-op_user}
      POSTGRES_PASSWORD: ${OP_DB_PASS:-changeme}
    volumes:
      - openproject_pgdata:/var/lib/postgresql/data
    networks:
      - project_net
