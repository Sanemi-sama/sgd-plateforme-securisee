{% extends 'base.html' %}
{% block title %}Changer le mot de passe{% endblock %}
{% block content %}
<div style="max-width:460px;margin:0 auto">
  <div class="card">
    <div class="card-header"><span class="card-title"><i class="fas fa-key"></i> Changer le mot de passe</span></div>
    <form method="post">
      {% csrf_token %}
      {% for field in form %}
      <div class="form-group">
        <label>{{ field.label }}</label>
        {{ field }}
        {% for e in field.errors %}<ul class="errorlist"><li>{{ e }}</li></ul>{% endfor %}
      </div>
      {% endfor %}
      <div class="form-actions">
        <a href="{% url 'users:profile' %}" class="btn btn-secondary">Annuler</a>
        <button type="submit" class="btn btn-primary"><i class="fas fa-check"></i> Confirmer</button>
      </div>
    </form>
  </div>
</div>
{% endblock %}
